name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  # 🔹 1. BUILD STAGE
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔥 FIX: backend folder मध्ये install
      - name: Install dependencies
        run: |
          cd backend
          npm install

      # 🔥 Optional check
      - name: Check server start
        run: |
          cd backend
          node server.js &
          sleep 3

      - name: Build success
        run: echo "Build completed ✅"

  # 🔹 2. TEST STAGE
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dummy test
        run: echo "Tests passed ✅"

  # 🔹 3. DEPLOY STAGE
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      # 🐳 Build Docker Image
      - name: Build Image
        run: |
          gcloud builds submit \
          --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/cloudship-app \
          --quiet

      # ☁️ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy cloudship-app \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/cloudship-app \
          --region asia-south1 \
          --platform managed \
          --allow-unauthenticated